apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard
  namespace: tema-std
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: wordpress-mysql-pv
  namespace: tema-std
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: "/mnt/data/wordpress-mysql"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongodb-pv
  namespace: tema-std
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: "/mnt/data/mongodb"